<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>スマホ簡易ＣＡＤ - Pro Elite v6</title>
    <style>
        :root {
            --primary: #00e5ff; --bg: #0a0e14; --surface: #161c24; --text: #e1e4e8;
            --text-dim: #9aa1a9; --accent: #ff9100; --success: #00c853; --border: #2d333b;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 0.5rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 0.85rem; color: var(--primary); font-weight: bold; }
        .active-input { border: 2px solid var(--primary) !important; box-shadow: 0 0 8px var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .config-bar { background: var(--surface); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        .form-gp { display: flex; align-items: center; gap: 3px; }
        .form-gp label { font-size: 0.55rem; color: var(--text-dim); }
        .form-gp input { background: var(--bg); border: 1px solid #333; color: var(--text); padding: 2px 4px; border-radius: 3px; font-size: 0.7rem; width: 65px; font-family: monospace; }
        .workspace { flex: 1; display: grid; grid-template-columns: 420px 1fr; overflow: hidden; }
        .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: #0c1117; min-width: 320px; }
        .drop-zone { padding: 0.75rem; margin: 0.5rem; border: 1px dashed #444; border-radius: 6px; text-align: center; font-size: 0.7rem; color: var(--text-dim); cursor: pointer; }
        .table-wrap { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.65rem; table-layout: fixed; }
        thead th { position: sticky; top: 0; background: #1c252e; padding: 7px; text-align: left; border-bottom: 1px solid var(--border); color: #888; font-weight: normal; z-index: 10; }
        tbody td { padding: 5px 6px; border-bottom: 1px solid #1c252e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .session-row { background: #1a222a; color: var(--primary); font-weight: bold; padding: 6px 8px; font-size: 0.6rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .session-details { color: var(--text-dim); font-weight: normal; padding-left: 10px; font-size: 0.55rem; }
        .row-selected { background: rgba(0, 229, 255, 0.1) !important; }
        .row-selected .st-name { color: var(--primary); }
        .st-name { color: #eee; font-weight: bold; }
        .type-st { background: #006064; color: #fff; font-size: 0.55rem; padding: 1px 4px; border-radius: 2px; }
        .action-bar { padding: 0.75rem; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .btn-action { flex: 1; background: var(--primary); color: #000; padding: 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; font-weight: bold; text-align: center; border: none; }
        .btn-action:active { filter: brightness(0.8); transform: translateY(1px); }
        .tool-panel { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .tool-gp-v { display: flex; flex-direction: column; background: rgba(22, 28, 36, 0.9); border: 1px solid #444; border-radius: 8px; overflow: hidden; }
        .t-btn { padding: 8px 12px; font-size: 0.7rem; color: #ccc; border: none; background: transparent; cursor: pointer; text-align: left; border-bottom: 1px solid #333; }
        .t-btn:last-child { border-bottom: none; }
        .t-btn.active { background: var(--primary); color: #000; font-weight: bold; }
        .viewport { position: relative; background: #050505; flex: 1; transition: flex 0.4s ease; }
        canvas { display: block; touch-action: none; background: #000; }
        .ctrls { position: absolute; bottom: 15px; right: 15px; display: flex; flex-direction: column; gap: 8px; }
        .c-btn { width: 38px; height: 38px; background: rgba(22, 28, 36, 0.9); border: 1px solid #444; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        @media (max-width: 1100px) { 
            .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1.2fr; transition: grid-template-rows 0.4s ease; }
            .workspace.minimized { grid-template-rows: 0fr 1fr; }
            .sidebar { transition: flex 0.4s ease; overflow: hidden; }
            .workspace.minimized .config-bar, 
            .workspace.minimized .drop-zone, 
            .workspace.minimized .table-wrap { display: none; }
        }
        .main-content.minimized .config-bar { display: none; }
        .sidebar.minimized .drop-zone, .sidebar.minimized .table-wrap { display: none; }
        .sidebar.minimized { min-height: 0; flex: 0; }
        .workspace.minimized { grid-template-rows: auto 1fr; }
    </style>
</head>
<body>
<header><h1>スマホ簡易ＣＡＤ <span style="opacity:0.5; font-size: 0.6rem;">Precision v6.0</span></h1></header>
<div class="main-content">
    <div class="config-bar">
        <label style="font-size:0.6rem; color:var(--primary); font-weight:bold;">起点定数:</label>
        <div class="form-gp"><label>X</label><input type="text" id="initX" value="100.000"></div>
        <div class="form-gp"><label>Y</label><input type="text" id="initY" value="100.000"></div>
        <div class="form-gp"><label>Z</label><input type="text" id="initZ" value="0.000"></div>
        <div class="form-gp"><label>Azi</label><input type="text" id="initAzi" value="0.0000"></div>
    </div>
    <div class="workspace">
        <div class="sidebar">
            <div style="padding: 10px; display: flex; gap: 8px;">
                <button class="btn-action" id="btnExportSima" style="padding: 6px; font-size: 0.65rem; background: #333; color: #fff; border: 1px solid #555;">SIMA出力</button>
                <div class="drop-zone" id="dropZone" style="flex:1; margin:0; padding: 5px; font-size: 0.6rem;">APAドロップ</div>
            </div>
            <div class="table-wrap">
                <table>
                    <colgroup><col width="45"><col width="85"><col width="90"><col width="90"><col width="90"></colgroup>
                    <thead><tr><th></th><th>測点名称</th><th style="text-align:right">X</th><th style="text-align:right">Y</th><th style="text-align:right">Z</th></tr></thead>
                    <tbody id="pTableBody"></tbody>
                </table>
            </div>
        </div>
        <div id="canvasWrapper" class="viewport">
                <div class="tool-gp-v">
                    <button class="t-btn active" id="modeSelect">点選択</button>
                    <button class="t-btn" id="modeLine">結線設定</button>
                </div>
                <div id="linePanel" style="display:none; flex-direction: column; padding: 6px; background: rgba(22,28,36,0.95); width: 200px; box-sizing: border-box; border: 1px solid #444; border-radius: 8px; margin-top: 8px;">
                    <select id="selLineType" style="margin-bottom: 8px; padding: 4px; font-size: 0.7rem; background: #000; color: #fff; border: 1px solid #555;">
                        <option value="solid">実線</option>
                        <option value="dash_red">一点鎖線(赤)</option>
                        <option value="cb">CB塀</option>
                        <option value="cb_fence">CB塀+ﾌｪﾝｽ</option>
                    </select>
                    <div id="cbOptions" style="display:none; flex-direction: column; gap: 6px; margin-bottom: 8px; background: #1a222a; padding: 4px; border-radius: 4px;">
                        <div style="display:flex; justify-content: space-around;">
                            <label style="color:#ccc; font-size: 0.65rem;"><input type="radio" name="cbSide" value="right" checked> 右</label>
                            <label style="color:#ccc; font-size: 0.65rem;"><input type="radio" name="cbSide" value="left"> 左</label>
                        </div>
                        <div style="display:flex; justify-content: space-around;">
                            <label style="color:#ccc; font-size: 0.65rem;"><input type="radio" name="cbWidth" value="0.1" checked> 100</label>
                            <label style="color:#ccc; font-size: 0.65rem;"><input type="radio" name="cbWidth" value="0.12"> 120</label>
                            <label style="color:#ccc; font-size: 0.65rem;"><input type="radio" name="cbWidth" value="0.15"> 150</label>
                        </div>
                    </div>
                    <div style="display:flex; gap: 4px; align-items: center; margin-bottom: 8px;">
                        <input type="text" id="lnP1" placeholder="起点" style="flex:1; width:0; font-size: 0.7rem; padding: 3px; background: #1a222a; color: #fff; border: 1px solid #555;">
                        <span style="color:#fff;">→</span>
                        <input type="text" id="lnP2" placeholder="到着" style="flex:1; width:0; font-size: 0.7rem; padding: 3px; background: #1a222a; color: #fff; border: 1px solid #555;">
                    </div>
                    <button id="btnDrawLine" style="background:var(--primary); color:#000; border:none; padding: 6px; font-weight:bold; cursor:pointer; border-radius: 4px; font-size: 0.75rem;">作図</button>
                </div>
            </div>
            <canvas id="cadCanvas"></canvas>
            <div class="ctrls" style="left: 15px; right: auto; align-items: flex-start;">
                <div class="c-btn" id="btnUndoLine" style="width: auto; height: auto; border-radius: 6px; padding: 6px 10px; font-size: 0.65rem; font-weight: bold;">戻る</div>
                <div class="c-btn" id="toggleLabel" style="width: auto; height: auto; border-radius: 6px; padding: 6px 10px; font-size: 0.65rem; font-weight: bold;">点名:表示</div>
            </div>
            <div class="ctrls">
                <div class="c-btn" id="btnZoomIn">+</div>
                <div class="c-btn" id="btnZoomOut">-</div>
                <div class="c-btn" id="btnFit">回</div>
            </div>
        </div>
    </div>
</div>
<input type="file" id="fileInput" style="display: none;">
<script>
    const parseDMS = (s) => { if (!s) return 0.0; const v = parseFloat(s); const d = Math.floor(v + 1e-7), ms = (v - d) * 100, min = Math.floor(ms + 1e-4), sec = (ms - min) * 100; return d + (min / 60) + (sec / 3600); };
    class SurveyEngine {
        constructor() { this.pts = new Map(); this.log = []; this.aziBase = 0; this.st = null; }
        reset(x,y,z,azi) { this.pts.clear(); this.log = []; this.aziBase = azi; this.st = {x,y,z,name:'',ih:0}; }
        process(text) {
            const lines = text.split(/\n/).map(l => l.trim().split(',').map(s => s.trim()));
            let sessionFlag = true; // 初回セッションの最初のFもBSとして扱う
            let curSess = { type: 'SESS', name: `据付 (開始)`, inst: '?', bs: '?' };
            this.log.push(curSess);

            for (let p of lines) {
                if (p[0] === 'B') { 
                    if (this.log.length > 1) { // 既に開始セッションがある場合は更新
                        curSess = { type: 'SESS', name: `据付 (更新)`, inst: '?', bs: '?' }; 
                        this.log.push(curSess); 
                    }
                    sessionFlag = true; 
                }
                if (p[0] === 'D') {
                    const nm = p[1], ih = parseFloat(p[3]) || 0;
                    if(this.pts.has(nm)) this.st = { ...this.pts.get(nm), name: nm, ih };
                    else { if (!this.pts.size) this.pts.set(nm, { x: this.st.x, y: this.st.y, z: this.st.z }); this.st.name = nm; this.st.ih = ih; }
                    if (curSess) curSess.inst = nm;
                    if (this.log.filter(l => l.type === 'SESS').length <= 1 && !this.log.some(l => l.type === 'ST')) {
                        this.log.push({ type: 'ST', name: nm, ...this.pts.get(nm) });
                    }
                }
                if (p[0] === 'F' && p.length >= 8) {
                    const nm = p[1], th = parseFloat(p[3]) || 0, ha = parseDMS(p[5]), va = parseDMS(p[6]), sd = parseFloat(p[7]) || 0;
                    if (sessionFlag) {
                        sessionFlag = false; let bs = nm;
                        // 知っている点を探す、なければ最初のFを方位基準とする
                        if (!this.pts.has(bs)) { for (let k of this.pts.keys()) { if (k !== this.st.name) { bs = k; break; } } }
                        
                        if (this.pts.has(bs)) {
                            const b = this.pts.get(bs);
                            this.aziBase = ((Math.atan2(b.y - this.st.y, b.x - this.st.x) * 180 / Math.PI + 360) % 360 - ha + 360) % 360;
                            if (curSess) curSess.bs = bs; 
                            continue; // 1回目でも後視点は表示しない
                        } else {
                            // 既知点がない（初回）の場合は入力された当初方向角をベースに方位確定。点自体は表示しない。
                            if (curSess) curSess.bs = nm;
                            continue;
                        }
                    }
                    const azi = (this.aziBase + ha) % 360, ar = azi * Math.PI/180, vr = va * Math.PI/180;
                    const hd = sd * Math.sin(vr), dz = sd * Math.cos(vr) + this.st.ih - th;
                    const res = { x: this.st.x + hd*Math.cos(ar), y: this.st.y + hd*Math.sin(ar), z: this.st.z + dz };
                    if (!this.pts.has(nm)) { this.pts.set(nm, res); this.log.push({ type: 'OB', name: nm, ...res }); }
                    else this.log.push({ type: 'CHECK', name: nm, ...this.pts.get(nm) });
                }
            }
            return this.log;
        }
    }

    class CadView {
        constructor() {
            this.cnv = document.getElementById('cadCanvas'); this.wrp = document.getElementById('canvasWrapper'); this.ctx = this.cnv.getContext('2d');
            this.sc = 25; this.ox = 0; this.oy = 0; this.pts = []; this.selected = null;
            this.lines = []; this.curMode = 'select'; this.showLabel = true; this.focusInput = 1;
            this.resize(); this.init(); window.onresize = () => this.resize();
        }
        resize() { this.cnv.width = this.wrp.clientWidth; this.cnv.height = this.wrp.clientHeight; this.draw(); }
        draw() {
            const ctx = this.ctx; ctx.clearRect(0,0,this.cnv.width,this.cnv.height);
            
            this.lines.forEach(l => {
                const p1 = this.pts.find(p => p.name === l.p1);
                const p2 = this.pts.find(p => p.name === l.p2);
                if (!p1 || !p2) return;
                const s1 = { x: p1.y * this.sc + this.ox, y: -p1.x * this.sc + this.oy };
                const s2 = { x: p2.y * this.sc + this.ox, y: -p2.x * this.sc + this.oy };
                
                ctx.save();
                ctx.beginPath();
                if (l.type === 'solid') {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.0;
                    ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
                } else if (l.type === 'dash_red') {
                    ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 1.5;
                    ctx.setLineDash([10, 4, 2, 4]); // 一点鎖線
                    ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
                } else if (l.type === 'cb' || l.type === 'cb_fence') {
                    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.0;
                    let angle = Math.atan2(s2.y - s1.y, s2.x - s1.x);
                    let dist = Math.hypot(s2.x - s1.x, s2.y - s1.y);
                    let w = l.width * this.sc; 
                    let sig = l.side === 'right' ? 1 : -1;
                    let dx = Math.cos(angle + Math.PI/2) * sig * w;
                    let dy = Math.sin(angle + Math.PI/2) * sig * w;
                    
                    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(s1.x + dx, s1.y + dy); ctx.lineTo(s2.x + dx, s2.y + dy); ctx.stroke();
                    
                    let step = 0.4 * this.sc; 
                    for(let i=0; i<=dist; i+=step) {
                        let px1 = s1.x + Math.cos(angle)*i, py1 = s1.y + Math.sin(angle)*i;
                        ctx.beginPath(); ctx.moveTo(px1, py1); ctx.lineTo(px1 + dx, py1 + dy); ctx.stroke();
                        let blockIdx = Math.floor(i / step);
                        
                        if (l.type === 'cb') {
                            if (blockIdx % 2 === 1) {
                                let endI = Math.min(dist, i + step);
                                for(let j=1; j<=3; j++) {
                                    let pdx = dx * (j/4), pdy = dy * (j/4);
                                    let spx1 = px1 + pdx, spy1 = py1 + pdy;
                                    let spx2 = s1.x + Math.cos(angle)*endI + pdx;
                                    let spy2 = s1.y + Math.sin(angle)*endI + pdy;
                                    ctx.beginPath(); ctx.moveTo(spx1, spy1); ctx.lineTo(spx2, spy2); ctx.stroke();
                                }
                            }
                        } else if (l.type === 'cb_fence') {
                            if (blockIdx % 5 === 0 && (i + step/2) <= dist) {
                                let midI = i + step / 2;
                                let cx = s1.x + Math.cos(angle)*midI + dx/2;
                                let cy = s1.y + Math.sin(angle)*midI + dy/2;
                                let radiusOuter = Math.abs(dx * 0.4);
                                let radiusInner = Math.abs(dx * 0.15);
                                ctx.beginPath(); ctx.arc(cx, cy, Math.max(0.5, radiusInner), 0, Math.PI*2); ctx.stroke();
                                ctx.beginPath(); ctx.arc(cx, cy, Math.max(1.5, radiusOuter), 0, Math.PI*2); ctx.stroke();
                            }
                        }
                    }

                    if (l.type === 'cb_fence') {
                        let midX1 = s1.x + dx/2, midY1 = s1.y + dy/2;
                        let midX2 = s1.x + Math.cos(angle)*dist + dx/2;
                        let midY2 = s1.y + Math.sin(angle)*dist + dy/2;
                        ctx.beginPath(); ctx.moveTo(midX1, midY1); ctx.lineTo(midX2, midY2);
                        ctx.save(); ctx.setLineDash([4, 4]); ctx.stroke(); ctx.restore();
                    }
                }
                ctx.restore();
            });

            this.pts.forEach(p => {
                if(p.x === undefined) return;
                const sx = p.y * this.sc + this.ox, sy = -p.x * this.sc + this.oy;
                const sel = p.name === this.selected;
                // 色の変更: 選択=金, 据付点=シアン, 通常点=イエロー
                ctx.fillStyle = sel ? '#ffd700' : (p.type === 'ST' ? '#00e5ff' : '#ffff00');
                ctx.beginPath(); ctx.arc(sx, sy, sel ? 6 : 4, 0, 7); ctx.fill();
                if(sel) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
                
                if (this.showLabel) {
                    ctx.fillStyle = sel ? '#fff' : '#00e5ff'; // 点名はシアンで見やすく
                    ctx.font = sel ? 'bold 12px sans-serif' : '10px sans-serif'; 
                    ctx.fillText(p.name, sx+8, sy-4);
                }
            });
        }
        autoFit() {
            const vs = this.pts.filter(i => i.x !== undefined); if(!vs.length) return;
            let x0=Infinity, x1=-Infinity, y0=Infinity, y1=-Infinity;
            vs.forEach(i=>{ x0=Math.min(x0,i.x); x1=Math.max(x1,i.x); y0=Math.min(y0,i.y); y1=Math.max(y1,i.y); });
            const rangeX = x1 - x0 || 1, rangeY = y1 - y0 || 1;
            const pad = 40;
            const sw = this.cnv.width - pad * 2, sh = this.cnv.height - pad * 2;
            this.sc = Math.min(sw / rangeY, sh / rangeX);
            this.ox = this.cnv.width/2 - ((y0+y1)/2) * this.sc;
            this.oy = this.cnv.height/2 + ((x0+x1)/2) * this.sc;
            this.draw();
        }
        select(name) { 
            if (this.curMode === 'line') {
                if (this.focusInput === 1) {
                    document.getElementById('lnP1').value = name;
                    this.setFocusInput(2, true);
                } else {
                    document.getElementById('lnP2').value = name;
                    this.setFocusInput(1, true);
                }
            }
            this.selected = name; this.draw(); 
            const tr = document.querySelector(`tr[data-name="${name}"]`); 
            if(tr) tr.scrollIntoView({behavior:'smooth', block:'center'});
            document.querySelectorAll('tr').forEach(r => r.classList.toggle('row-selected', r.getAttribute('data-name') === name));
        }
        setFocusInput(idx, suppressKeyboard) {
            this.focusInput = idx;
            const i1 = document.getElementById('lnP1'), i2 = document.getElementById('lnP2');
            const target = idx === 1 ? i1 : i2;
            i1.classList.toggle('active-input', idx === 1);
            i2.classList.toggle('active-input', idx === 2);
            
            if (suppressKeyboard) {
                target.inputMode = 'none';
                target.focus();
                setTimeout(() => { target.inputMode = 'text'; }, 100);
            } else {
                target.focus();
            }
        }
        init() {
            let dragging = false, lx, ly;
            let lastDist = 0, lastMidX = 0, lastMidY = 0;
            let activePointers = new Map();

            const getDistance = (p1, p2) => Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);

            this.cnv.onpointerdown = (e) => {
                activePointers.set(e.pointerId, e);
                this.cnv.setPointerCapture(e.pointerId);
                
                if (activePointers.size === 1) {
                    dragging = true; lx = e.clientX; ly = e.clientY;
                    // 点の選択（シングルタップ時のみ）
                    const rect = this.cnv.getBoundingClientRect(); const mx = e.clientX-rect.left, my = e.clientY-rect.top;
                    let found = null, minD = 30;
                    this.pts.forEach(p => { if(p.x === undefined) return; const sx = p.y*this.sc+this.ox, sy = -p.x*this.sc+this.oy; const dist = Math.hypot(mx-sx, my-sy); if(dist < minD) { found = p.name; minD = dist; } });
                    if(found) this.select(found);
                } else if (activePointers.size === 2) {
                    dragging = false; 
                    const pts = [...activePointers.values()];
                    lastDist = getDistance(pts[0], pts[1]);
                    lastMidX = (pts[0].clientX + pts[1].clientX) / 2;
                    lastMidY = (pts[0].clientY + pts[1].clientY) / 2;
                }
            };

            this.cnv.onpointermove = (e) => {
                activePointers.set(e.pointerId, e);
                if (activePointers.size === 1 && dragging) {
                    this.ox += e.clientX - lx; this.oy += e.clientY - ly;
                    lx = e.clientX; ly = e.clientY;
                    this.draw();
                } else if (activePointers.size === 2) {
                    const pts = [...activePointers.values()];
                    const dist = getDistance(pts[0], pts[1]);
                    const midX = (pts[0].clientX + pts[1].clientX) / 2;
                    const midY = (pts[0].clientY + pts[1].clientY) / 2;
                    
                    if (lastDist > 0) {
                        const f = dist / lastDist;
                        const rect = this.cnv.getBoundingClientRect();
                        const cx = midX - rect.left, cy = midY - rect.top;

                        // ピンチ中に指がスライドした分の平行移動
                        this.ox += (midX - lastMidX);
                        this.oy += (midY - lastMidY);

                        // ズーム
                        this.ox = cx - (cx - this.ox) * f;
                        this.oy = cy - (cy - this.oy) * f;
                        this.sc *= f;
                        this.draw();
                    }
                    lastDist = dist; lastMidX = midX; lastMidY = midY;
                }
            };

            this.cnv.onpointerup = (e) => {
                activePointers.delete(e.pointerId);
                if (activePointers.size < 2) lastDist = 0;
                if (activePointers.size === 1) {
                    const remaining = [...activePointers.values()][0];
                    lx = remaining.clientX; ly = remaining.clientY;
                    dragging = true;
                }
                if (activePointers.size === 0) dragging = false;
            };
            this.cnv.onpointercancel = this.cnv.onpointerup;

            this.cnv.onwheel = (e) => {
                e.preventDefault();
                const f = e.deltaY > 0 ? 0.9 : 1.1;
                this.ox = e.offsetX - (e.offsetX - this.ox) * f;
                this.oy = e.offsetY - (e.offsetY - this.oy) * f;
                this.sc *= f; this.draw();
            };

            // UIコントロールのイベント
            document.getElementById('modeSelect').onclick = () => this.setMode('select');
            document.getElementById('modeLine').onclick = () => this.setMode('line');
            
            document.getElementById('lnP1').onclick = () => this.setFocusInput(1);
            document.getElementById('lnP2').onclick = () => this.setFocusInput(2);
            
            document.getElementById('selLineType').onchange = (e) => {
                document.getElementById('cbOptions').style.display = (e.target.value === 'cb' || e.target.value === 'cb_fence') ? 'flex' : 'none';
            };

            document.getElementById('btnDrawLine').onclick = () => {
                let p1 = document.getElementById('lnP1').value.trim();
                let p2 = document.getElementById('lnP2').value.trim();
                if(!p1 || !p2) return alert("出発点と到着点を入力してください");
                
                if(!this.pts.find(p=>p.name === p1) || !this.pts.find(p=>p.name === p2)) {
                    return alert("指定された点が見つかりません");
                }
                
                let type = document.getElementById('selLineType').value;
                let side = document.querySelector('input[name="cbSide"]:checked').value;
                let width = parseFloat(document.querySelector('input[name="cbWidth"]:checked').value);
                
                this.lines.push({ p1, p2, type, side, width });
                this.draw();
                
                document.getElementById('lnP1').value = p2;
                document.getElementById('lnP2').value = '';
                this.setFocusInput(2, true);
            };

            document.getElementById('toggleLabel').onclick = () => {
                this.showLabel = !this.showLabel;
                document.getElementById('toggleLabel').innerText = `点名:${this.showLabel?'表示':'非表示'}`;
                this.draw();
            };
            
            document.getElementById('btnUndoLine').onclick = () => {
                if(this.lines.length > 0) {
                    this.lines.pop();
                    this.draw();
                }
            };
        }
        setMode(m) {
            this.curMode = m;
            document.getElementById('modeSelect').classList.toggle('active', m === 'select');
            document.getElementById('modeLine').classList.toggle('active', m === 'line');
            document.getElementById('linePanel').style.display = m === 'line' ? 'flex' : 'none';
            
            // 結線モード時は上部（点リスト等）を最小化
            const isMin = (m === 'line');
            document.querySelector('.config-bar').style.display = isMin ? 'none' : 'flex';
            document.querySelector('.sidebar').classList.toggle('minimized', isMin);
            if (window.innerWidth <= 1100) {
                document.querySelector('.workspace').classList.toggle('minimized', isMin);
            }
            
            if (m === 'line') {
                this.setFocusInput(1, true);
                // 画面サイズ変更に伴いキャンバスをリサイズ
                setTimeout(() => this.resize(), 500);
            } else {
                this.resize();
            }
        }
        zoomRelative(f) {
            const rect = this.cnv.getBoundingClientRect();
            // Androidブラウザ等の解像度差異を吸収するため、物理サイズから正確な中心を取得
            const cx = rect.width / 2, cy = rect.height / 2;
            this.ox = cx - (cx - this.ox) * f;
            this.oy = cy - (cy - this.oy) * f;
            this.sc *= f;
            this.draw();
        }
    }

    const eng = new SurveyEngine(), view = new CadView();
    function run(file) {
        eng.reset(parseFloat(document.getElementById('initX').value), parseFloat(document.getElementById('initY').value), parseFloat(document.getElementById('initZ').value), parseFloat(document.getElementById('initAzi').value));
        const r = new FileReader(); r.onload = (e) => { 
            const res = eng.process(e.target.result); 
            view.pts = res; 
            update(res);
            view.resize(); // 描画前にサイズ確約
            setTimeout(() => { view.autoFit(); }, 100); 
        };
        r.readAsText(file, 'shift-jis');
    }
    function update(items) {
        const b = document.getElementById('pTableBody'); b.innerHTML = '';
        items.forEach(i => {
            const tr = document.createElement('tr');
            if(i.type === 'SESS') tr.innerHTML = `<td colspan="5" class="session-row">${i.name} <span class="session-details">ST:${i.inst} / BS:${i.bs}</span></td>`;
            else {
                tr.setAttribute('data-name', i.name); tr.onclick = () => view.select(i.name);
                tr.innerHTML = `<td>${(i.type==='ST')?'<span class="type-st">据付</span>':''}</td><td class="st-name">${i.name}</td><td style="text-align:right">${i.x.toFixed(3)}</td><td style="text-align:right">${i.y.toFixed(3)}</td><td style="text-align:right">${i.z.toFixed(3)}</td>`;
            }
            b.appendChild(tr);
        });
    }

    document.getElementById('btnExportSima').onclick = async () => {
        if (!eng.pts.size) return alert("データがありません");
        
        // SIMAファイル構成の構築 (Z00, Z01, A99を追加)
        let s = "G00,スマホ簡易ＣＡＤ\r\n";
        s += "Z00, /* 座標データ */,\r\n";
        s += "Z01,2,\r\n"; // 座標単位コンマ区切り
        s += "A00,現場データ,1\r\n";
        
        let idx = 1;
        for (let [name, p] of eng.pts) {
            // A01,ID,点名,X,Y,Z,, (点名の後のカンマを1つに修正)
            s += `A01,${idx.toString().padStart(5,' ')},${name.padEnd(20,' ')},${p.x.toFixed(3).padStart(12,' ')},${p.y.toFixed(3).padStart(12,' ')},${p.z.toFixed(3).padStart(12,' ')},,\r\n`;
            idx++;
        }
        s += "A99,\r\n"; // 座標セクション終了
        
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        const fname = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.sim`;

        // 1. Windows (Chrome/Edge) 向の確実な保存
        if (window.showSaveFilePicker) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: fname,
                    types: [{ description: 'SIMAファイル', accept: { 'text/plain': ['.sim'] } }]
                });
                const writable = await handle.createWritable();
                await writable.write(s);
                await writable.close();
                return;
            } catch (e) { if (e.name !== 'AbortError') console.error(e); return; }
        }

        // 2. スマホ環境向の通常ダウンロード（UUID回避のための処理）
        const blob = new Blob([s], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 5000);
    };

    document.getElementById('dropZone').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => { if(e.target.files[0]) run(e.target.files[0]); };
    document.getElementById('btnZoomIn').onclick = () => view.zoomRelative(1.2);
    document.getElementById('btnZoomOut').onclick = () => view.zoomRelative(0.8);
    document.getElementById('btnFit').onclick = () => view.autoFit();
    window.ondragover = e => e.preventDefault();
    window.ondrop = e => { e.preventDefault(); if(e.dataTransfer.files[0]) run(e.dataTransfer.files[0]); };
</script>
